# Nginx Configuration for survey.thymez-tick.com
# Copy this file to: /etc/nginx/sites-available/survey.thymez-tick.com

server {
    listen 80;
    server_name survey.thymez-tick.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name survey.thymez-tick.com;
    
    # SSL Configuration (ปรับ path ตาม SSL cert ของคุณ)
    ssl_certificate /etc/letsencrypt/live/survey.thymez-tick.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/survey.thymez-tick.com/privkey.pem;
    
    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Logs
    access_log /var/log/nginx/survey-access.log;
    error_log /var/log/nginx/survey-error.log;
    
    # Max upload size
    client_max_body_size 50M;
    
    # WebSocket proxy for Socket.IO (สำคัญมาก!)
    location /socket.io/ {
        proxy_pass http://localhost:8091;
        proxy_http_version 1.1;
        
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for long-lived connections
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        
        # Disable buffering
        proxy_buffering off;
    }
    
    # API proxy (Backend API)
    location /api/ {
        proxy_pass http://localhost:8091;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Next.js frontend (ทุกอย่างที่เหลือ)
    location / {
        proxy_pass http://localhost:8090;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for Next.js HMR (development)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
